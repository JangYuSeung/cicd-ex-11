name: Auto-Scaling-Instance-Deployment-Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # AWS 자격 증명 구성 (ECR 로그인 및 S3 업로드에 필요)
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Upload Config and Assests to S3
      run: |
        aws s3 cp ./nginx/default.conf s3://${{ secrets.S3_BUCKET_NAME }}/nginx/conf.d/default.conf
        aws s3 cp ./docker-compose.yaml s3://${{ secrets.S3_BUCKET_NAME }}/docker-compose.yaml
        aws s3 sync ./nginx/html/ s3://${{ secrets.S3_BUCKET_NAME }}/html/ --delete

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2
    
    - name: 이미지 빌드 후 ECR에 푸시
      env: # 중요: docker-compose.yaml에서 참조하는 환경 변수명과 꼭 맞춰줘야 함
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        # Docker 이미지 빌드
        docker build --no-cache -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG ./nginx
        docker build --no-cache -t $ECR_REGISTRY/$ECR_REPOSITORY:latest ./nginx

        # ECR에 이미지 푸시
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

    # AWS SSM을 사용하여 EC2 인스턴스에 배포 명령 실행
    - name: Deploy to EC2 using SSM
      run: |
        IMAGE_URI="${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:${{ github.sha }}"
        aws ssm send-command \
          --document-name "AWS-RunShellScript" \
          --targets "Key=tag:${{ secrets.ASG_TAG_KEY }}, Values=${{ secrets.ASG_TAG_VALUE }}" \
          --region ${{ secrets.AWS_REGION }} \
          --parameters 'commands=[
            "mkdir -p /home/ec2-user/nginx/html",
            "mkdir -p /home/ec2-user/nginx/conf.d",
            "mkdir -p /home/ec2-user/nginx/logs",
            "chown -R ec2-user:ec2-user /home/ec2-user/nginx",
            
            "aws s3 cp s3://${{ secrets.S3_BUCKET_NAME }}/nginx/conf.d/default.conf /home/ec2-user/nginx/conf.d/default.conf.d/default.conf",
            "aws s3 cp s3://${{ secrets.S3_BUCKET_NAME }}/docker-compose.yaml /home/ec2-user/docker-compose.yaml",
            "aws s3 sync s3://${{ secrets.S3_BUCKET_NAME }}/html/ /home/ec2-user/nginx/html/ --delete",
            
            # 
            "export ECR_REGISTRY=${{ steps.login-ecr.outputs.registry }}",
            "export ECR_REPOSITORY=${{ secrets.ECR_REPOSITORY }}",
            "export IMAGE_TAG=${{ github.sha }}",

            "docker stop nginx-container || true",
            "docker rm nginx-container || true",
            "docker rmi $(docker images -q)",

            "cd /home/ec2-user/nginx",
            "docker compose pull",
            "docker compose up -d --remove-orphans",
            "rm -f /home/ec2-user/docker-compose.yaml",
            "rm -f /home/ec2-user/nginx/Dockrfile",

            "docker image prune -f"

          ]'