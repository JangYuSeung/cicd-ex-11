services:
  nginx-app: # 458894893383.dkr.ecr.ap-south-2.amazonaws.com/st8/nginx:latest
    image: ${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}
    # build:
    #   context: ./nginx
    #   dockerfile: Dockerfile
    container_name: nginx-container
    ports:
      - "80:80"
    volumes:
      - /home/ec2-user/nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf
      - /home/ec2-user/nginx/html:/usr/share/nginx/html
      - /home/ec2-user/nginx/logs:/var/log/nginx
    restart: always
    networks:
      - public-subnet
        aliases:
          - nginx-svc

networks:
  public-subnet: # 지금은 사용하지 않지만, 나중에 fastapi를 위한 nginx의 default.conf의 프록시 설정에서 별칭 사용해주려고
    driver: bridge